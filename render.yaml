services:
  - type: web
    name: smart-career-assistant-backend
    runtime: docker
    plan: free
    rootDir: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: AUTH0_ISSUER_URI
        value: https://sharmavishal1.us.auth0.com/
      - key: AUTH0_AUDIENCE
        value: https://smart-career-assistant-api
      - key: FRONTEND_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_URL
        value: https://api.groq.com/openai/v1/chat/completions
